name: Keep Supabase DB Awake
on:
  schedule:
    # Runs at 00:00 every 6th day
    - cron: '0 0 */6 * *'
  workflow_dispatch: # This allows you to run it manually to test!

jobs:
  ping_db:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive request
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/users?select=user_id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
